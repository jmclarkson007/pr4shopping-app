<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4Shopping | Partner Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo { font-size: 28px; font-weight: bold; text-decoration: none; }
        .logo-pr4 { color: #cc0000; }
        .logo-shopping { color: #000; }
        .btn-red { background-color: #cc0000; transition: all 0.3s; }
        .btn-red:hover { background-color: #a30000; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white border-b border-gray-200 py-6 text-center">
        <div class="logo"><span class="logo-pr4">PR4</span><span class="logo-shopping">Shopping</span></div>
        <p class="text-[10px] tracking-[0.3em] text-gray-400 uppercase mt-1 font-bold">Founding Partner Program</p>
    </header>

    <main class="max-w-xl mx-auto py-10 px-6">
        <div class="bg-white p-8 rounded-lg border border-gray-200 shadow-sm">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Register Your Business</h2>
            <form id="registrationForm" class="space-y-5">
                <input type="text" name="businessName" placeholder="Business Name" required class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 outline-none">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="contactName" placeholder="Contact Name" required class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 outline-none">
                    <input type="tel" name="phone" placeholder="Phone Number" required class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 outline-none">
                </div>
                <input type="email" name="email" placeholder="Contact Email" required class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 outline-none">

                <input type="text" name="address1" placeholder="Address Line 1" required class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <select name="city" required class="w-full px-4 py-3 border border-gray-300 rounded bg-white text-sm">
                        <option value="">Select City...</option>
                        <option value="Bath">Bath</option><option value="Leicester">Leicester</option>
                        </select>
                    <input type="text" name="postcode" placeholder="Postcode" required class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 outline-none">
                </div>

                <select name="category" id="categorySelect" required class="w-full px-4 py-3 border border-gray-300 rounded bg-white text-sm">
                    <option value="">Select Category...</option>
                    <option value="Coffee">Coffee & Quick Bite</option>
                    <option value="Dining">Dining & Drinks</option>
                    <option value="Shopping">Everyday Shopping</option>
                    <option value="Leisure">Experience & Leisure</option>
                </select>

                <textarea name="offer" required placeholder="Describe your exclusive offer..." class="w-full px-4 py-3 border border-gray-300 rounded h-28 focus:border-red-600 outline-none text-sm"></textarea>

                <button type="submit" id="submitBtn" class="w-full btn-red text-white font-bold py-4 rounded text-lg shadow-md uppercase tracking-wider">Proceed to Setup</button>
            </form>
        </div>
    </main>

    <script>
        const stripeLinks = {
            "Coffee": "https://buy.stripe.com/test_9B66oGcmS32p7Mhg6d1oI02",
            "Dining": "https://buy.stripe.com/test_6oUfZgdqW32p2rX2fn1oI03",
            "Shopping": "https://buy.stripe.com/test_4gMfZg72y6eB5E95rz1oI04",
            "Leisure": "https://buy.stripe.com/test_cNi28q3QmfPb1nT9HP1oI05"
        };

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Saving Details...";

            // Gather all data into a JSON object to match your Script's JSON.parse()
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            // Add the missing "StripeID" and "Fee" fields your script expects
            data.stripeId = "PENDING";
            data.fee = "1.00";
            data.cap = "Founding Partner";

            // SEND TO GOOGLE SCRIPT
            fetch('https://script.google.com/macros/s/AKfycbwDBbCygo0XVBFsvUWffsmciQ03__pM70nHaSY1h_oyIqEaadRMXKgyrLBNmZ39yePQ/exec', {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data) // Sending clean JSON
            });

            // Redirect to Stripe based on category
            setTimeout(() => {
                window.location.href = stripeLinks[data.category] || stripeLinks["Coffee"];
            }, 1500);
        });
    </script>
</body>
</html>
