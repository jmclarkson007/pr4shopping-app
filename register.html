<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration - PR4S</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        .price-display { background: #e8f4fd; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 5px solid #3498db; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .price-val { font-weight: bold; color: #2980b9; }
        button { width: 100%; padding: 15px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Business Registration</h2>
    <form id="registrationForm">
        <div class="form-group">
            <label>Business Name</label>
            <input type="text" id="businessName" placeholder="e.g. The Blue Lion" required>
        </div>
        
        <div class="form-group">
            <label>Contact Name</label>
            <input type="text" id="contactName" placeholder="Full Name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@business.com" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="01234 567890">
        </div>

        <hr>

        <div class="form-group">
            <label>Address Line 1</label>
            <input type="text" id="address1" placeholder="Street and House Number" required>
        </div>

        <div class="form-group)
            <label>Address Line 2 (Optional)</label>
            <input type="text" id="address2" placeholder="Suite, Unit, etc.">
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" id="city" placeholder="e.g. Bath" required>
        </div>

        <div class="form-group">
            <label>Postcode</label>
            <input type="text" id="postcode" placeholder="e.g. BA1 1UA" required>
        </div>

        <hr>

        <div class="form-group">
            <label>Business Category</label>
            <select id="category" onchange="updatePrice()">
                <option value="coffee">Coffee & Quick Bite</option>
                <option value="dining">Dining & Drinks</option>
                <option value="retail">Retail & Shopping</option>
                <option value="services">Professional Services</option>
            </select>
        </div>

        <div class="price-display">
            <div class="price-row">
                <span>Per Referral Fee:</span>
                <span class="price-val" id="feeLabel">£0.50</span>
            </div>
            <div class="price-row">
                <span>Monthly Cap:</span>
                <span class="price-val" id="capLabel">£25.00</span>
            </div>
        </div>

        <button type="submit">Complete Registration</button>
    </form>
</div>

<script>
    const pricing = {
        coffee: { fee: 0.50, cap: 25.00 },
        dining: { fee: 1.50, cap: 75.00 },
        retail: { fee: 1.00, cap: 50.00 },
        services: { fee: 2.00, cap: 100.00 }
    };

    function updatePrice() {
        const cat = document.getElementById('category').value;
        document.getElementById('feeLabel').innerText = "£" + pricing[cat].fee.toFixed(2);
        document.getElementById('capLabel').innerText = "£" + pricing[cat].cap.toFixed(2);
    }

    const form = document.getElementById('registrationForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // YOUR UNIQUE LINK
        const scriptURL = 'https://script.google.com/macros/s/AKfycby757z-QSrUzKLZt_pNGqALUbPWaXZrjRUWUmDTBPjLsREYEMCrZfmduNzOfWHXz8EqNA/exec';
        
        const formData = {
            businessName: document.getElementById('businessName').value,
            contactName: document.getElementById('contactName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            address1: document.getElementById('address1').value,
            address2: document.getElementById('address2').value,
            city: document.getElementById('city').value,
            postcode: document.getElementById('postcode').value,
            category: document.getElementById('category').options[document.getElementById('category').selectedIndex].text,
            fee: pricing[document.getElementById('category').value].fee,
            cap: pricing[document.getElementById('category').value].cap,
            stripeId: "PENDING"
        };

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors',
            body: JSON.stringify(formData)
        })
        .then(() => {
            alert("Thank you for registering! Click OK to proceed to secure payment via Stripe.");
            // Your payment link
            window.location.href = "https://buy.stripe.com/test_6oE7tB0YV6kX0uc9AA"; 
        })
        .catch(error => alert('Error: ' + error.message));
    });
</script>

</body>
</html>
