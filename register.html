<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Registration | PR4Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-pr4 { color: #cc0000; }
        .btn-red { background-color: #cc0000; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="py-8 text-center bg-white border-b">
        <div class="text-3xl font-black italic tracking-tighter">
            <span class="logo-pr4">PR4</span><span>Shopping.com</span>
        </div>
        <p class="text-[10px] tracking-[0.3em] text-gray-400 uppercase mt-2 font-bold font-sans">Partner Program</p>
    </header>

    <main class="max-w-md mx-auto py-10 px-6">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 mb-6 text-center uppercase tracking-tight">Business Registration</h2>
            
            <form id="registrationForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Business Name</label>
                    <input type="text" id="business_name" required class="w-full px-4 py-3 border border-gray-300 rounded outline-none focus:border-red-600 shadow-sm">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Operating City</label>
                    <select id="city" required class="w-full px-4 py-3 border border-gray-300 rounded bg-white outline-none focus:border-red-600 shadow-sm">
                        <option value="">Select City...</option>
                        <option value="Bath">Bath</option>
                        <option value="Bristol">Bristol</option>
                        <option value="Cambridge">Cambridge</option>
                        <option value="Canterbury">Canterbury</option>
                        <option value="Chelmsford">Chelmsford</option>
                        <option value="Exeter">Exeter</option>
                        <option value="Leeds">Leeds</option>
                        <option value="Leicester">Leicester</option>
                        <option value="Norwich">Norwich</option>
                        <option value="Oxford">Oxford</option>
                        <option value="Winchester">Winchester</option>
                        <option value="York">York</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Business Category</label>
                    <select id="category" required class="w-full px-4 py-3 border border-gray-300 rounded bg-white outline-none focus:border-red-600 shadow-sm">
                        <option value="">Select Category...</option>
                        <option value="Coffee & Quickbite">Coffee & Quickbite</option>
                        <option value="Dining & Drinks">Dining & Drinks</option>
                        <option value="Everyday Shopping">Everyday Shopping</option>
                        <option value="Experience & Leisure">Experience & Leisure</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Your Exclusive Offer</label>
                    <textarea id="offer_details" placeholder="e.g. 20% off all main meals" required class="w-full px-4 py-3 border border-gray-300 rounded h-24 outline-none focus:border-red-600 shadow-sm"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-red text-white font-bold py-4 rounded uppercase tracking-widest shadow-md hover:opacity-90 transition-opacity">
                    Register & Pay
                </button>
            </form>
        </div>
    </main>

    <footer class="p-8 text-center">
        <a href="index.html" class="text-[10px] font-bold text-gray-400 hover:text-red-600 uppercase tracking-widest">Back to Map</a>
    </footer>

    <script>
        const SUPABASE_URL = "https://cocjolczajrnikiwolly.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_AEPtmbQAf0U4_1gXLsAoLA_-HOM-3_w";

        // Mapping categories to your specific Stripe links
        const STRIPE_LINKS = {
            "Coffee & Quickbite": "https://buy.stripe.com/test_9B66oGcmS32p7Mhg6d1oI02",
            "Dining & Drinks": "https://buy.stripe.com/test_6oUfZgdqW32p2rX2fn1oI03",
            "Everyday Shopping": "https://buy.stripe.com/test_4gMfZg72y6eB5E95rz1oI04",
            "Experience & Leisure": "https://buy.stripe.com/test_cNi28q3QmfPb1nT9HP1oI05"
        };

        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const category = document.getElementById('category').value;
            const stripeLink = STRIPE_LINKS[category];

            btn.disabled = true;
            btn.innerText = "Redirecting to Stripe...";

            const payload = {
                business_name: document.getElementById('business_name').value,
                city: document.getElementById('city').value,
                category: category,
                offer_details: document.getElementById('offer_details').value,
                created_at: new Date().toISOString()
            };

            try {
                await fetch(`${SUPABASE_URL}Registrations_Database`, {
                    method: 'POST',
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify(payload)
                });
                
                window.location.href = stripeLink;
            } catch (error) {
                // Fail-safe: don't lose the sale if Supabase hiccups
                window.location.href = stripeLink;
            }
        });
    </script>
</body>
</html>
