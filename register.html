<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Registration | PR4Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-pr4 { color: #cc0000; }
        .logo-shopping { color: #000; }
        .btn-red { background-color: #cc0000; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="py-8 text-center bg-white border-b">
        <div class="text-3xl font-black italic tracking-tighter">
            <span class="logo-pr4">PR4</span><span class="logo-shopping">Shopping</span>
        </div>
        <p class="text-[10px] tracking-[0.3em] text-gray-400 uppercase mt-2 font-bold">Partner Program</p>
    </header>

    <main class="max-w-md mx-auto py-10 px-6">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 mb-6">Business Registration</h2>
            
            <form id="registrationForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Business Identity</label>
                    <input type="text" name="businessName" placeholder="Registered Business Name" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 outline-none transition-colors">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Operating City</label>
                    <select name="city" required class="w-full px-4 py-3 border border-gray-300 rounded bg-white outline-none focus:border-red-600">
                        <option value="">Select City...</option>
                        <option value="Bath">Bath</option>
                        <option value="Bristol">Bristol</option>
                        <option value="Cambridge">Cambridge</option>
                        <option value="Canterbury">Canterbury</option>
                        <option value="Chelmsford">Chelmsford</option>
                        <option value="Exeter">Exeter</option>
                        <option value="Leeds">Leeds</option>
                        <option value="Leicester">Leicester</option>
                        <option value="Norwich">Norwich</option>
                        <option value="Oxford">Oxford</option>
                        <option value="Winchester">Winchester</option>
                        <option value="York">York</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Your Exclusive Offer</label>
                    <textarea name="offer" placeholder="e.g. 20% Off Main Meals with P&R Ticket" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded h-24 focus:border-red-600 outline-none transition-colors"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-red text-white font-bold py-4 rounded uppercase tracking-widest shadow-md transition-opacity hover:opacity-90">
                    Register & Continue
                </button>
            </form>
        </div>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwH2BE3Vql7W4HzSquovq37lAthsJNV34cKn60pvkpEdec__0Zrq9HjkR2ook06M79u/exec';
        const STRIPE_LINK = 'https://buy.stripe.com/test_6ot6p99Yw5vV0oM3cc';

        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            
            btn.disabled = true;
            btn.innerText = "Saving Details...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            // Add required tracking fields for your A-P columns
            data.stripeId = "PENDING_STRIPE";
            data.category = "Partner"; // Default category for registration

            try {
                // Send data to Pending_Registrations Spreadsheet via the "Brain"
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });

                // Move to Stripe for the £1 payment
                window.location.href = STRIPE_LINK;
                
            } catch (error) {
                // If it fails to save, we still want the money. Send to Stripe.
                window.location.href = STRIPE_LINK;
            }
        });
    </script>
</body>
</html>
