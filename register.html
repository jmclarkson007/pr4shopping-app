<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | PR4Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-pr4 { color: #cc0000; }
        .btn-red { background-color: #cc0000; }
        input, select, textarea { border: 1px solid #e2e8f0 !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="py-8 text-center bg-white border-b shadow-sm">
        <div class="text-3xl font-black italic tracking-tighter">
            <span class="logo-pr4">PR4</span><span>Shopping.com</span>
        </div>
        <p class="text-[10px] tracking-[0.3em] text-gray-400 uppercase mt-2 font-bold">Official Partner Registration</p>
    </header>

    <main class="max-w-2xl mx-auto py-10 px-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-8 text-center uppercase tracking-tight">Business Profile</h2>
            
            <form id="registrationForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Registered Business Name</label>
                    <input type="text" id="business_name" required class="w-full px-4 py-3 rounded-lg outline-none focus:ring-2 focus:ring-red-600">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Contact Name</label>
                    <input type="text" id="contact_name" required class="w-full px-4 py-3 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Business Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 rounded-lg outline-none">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Operating City</label>
                    <select id="city" required class="w-full px-4 py-3 rounded-lg bg-white outline-none">
                        <option value="">Select City...</option>
                        <option value="Bath">Bath</option>
                        <option value="Bristol">Bristol</option>
                        <option value="Exeter">Exeter</option>
                        <option value="Oxford">Oxford</option>
                        </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Business Category</label>
                    <select id="category" required class="w-full px-4 py-3 rounded-lg bg-white outline-none">
                        <option value="">Select Category...</option>
                        <option value="Coffee & Quickbite">Coffee & Quickbite</option>
                        <option value="Dining & Drinks">Dining & Drinks</option>
                        <option value="Everyday Shopping">Everyday Shopping</option>
                        <option value="Experience & Leisure">Experience & Leisure</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Full Business Address (Street, Building, Postcode)</label>
                    <input type="text" id="address" required class="w-full px-4 py-3 rounded-lg outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Your Exclusive PR4 Offer</label>
                    <textarea id="offer_details" placeholder="What is the customer getting?" required class="w-full px-4 py-3 rounded-lg h-24 outline-none focus:ring-2 focus:ring-red-600"></textarea>
                </div>

                <div class="md:col-span-2 pt-4">
                    <button type="submit" id="submitBtn" class="w-full btn-red text-white font-black py-5 rounded-xl uppercase tracking-[0.2em] shadow-lg hover:scale-[1.02] transition-transform">
                        Proceed to Secure Payment
                    </button>
                    <p class="text-center text-[9px] text-gray-400 mt-4 uppercase">Registration is active for 12 months from date of payment.</p>
                </div>
            </form>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://cocjolczajrnikiwolly.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_AEPtmbQAf0U4_1gXLsAoLA_-HOM-3_w";

        const STRIPE_LINKS = {
            "Coffee & Quickbite": "https://buy.stripe.com/test_9B66oGcmS32p7Mhg6d1oI02",
            "Dining & Drinks": "https://buy.stripe.com/test_6oUfZgdqW32p2rX2fn1oI03",
            "Everyday Shopping": "https://buy.stripe.com/test_4gMfZg72y6eB5E95rz1oI04",
            "Experience & Leisure": "https://buy.stripe.com/test_cNi28q3QmfPb1nT9HP1oI05"
        };

        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const category = document.getElementById('category').value;
            const stripeLink = STRIPE_LINKS[category];

            btn.disabled = true;
            btn.innerText = "Securing Your Data...";

            const payload = {
                business_name: document.getElementById('business_name').value,
                contact_name: document.getElementById('contact_name').value,
                email: document.getElementById('email').value,
                city: document.getElementById('city').value,
                category: category,
                address: document.getElementById('address').value,
                offer_details: document.getElementById('offer_details').value,
                created_at: new Date().toISOString()
            };

            try {
                const response = await fetch(`${SUPABASE_URL}Registrations_Database`, {
                    method: 'POST',
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    // Redirect ONLY if the database confirmed the save
                    window.location.href = stripeLink;
                } else {
                    const err = await response.text();
                    alert("Registration Error: " + err);
                    btn.disabled = false;
                    btn.innerText = "Proceed to Secure Payment";
                }
            } catch (error) {
                alert("Network failure. Check your connection.");
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
