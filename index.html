<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4Shopping | Park & Ride Discounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pr4-red { color: #cc0000; }
        .bg-pr4 { background-color: #cc0000; }
        .card-accent { border-left: 4px solid #cc0000; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <header class="bg-white shadow-sm py-4 px-6 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-2xl font-black italic"><span class="pr4-red">PR4</span>Shopping</h1>
        <div id="status-badge" class="text-[10px] font-bold px-2 py-1 rounded bg-gray-200 text-gray-500 uppercase tracking-widest">
            Locating...
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div id="location-header" class="mb-6 hidden text-center">
            <h2 id="city-name" class="text-xl font-bold text-gray-800">Your Local Offers</h2>
            <p id="site-name" class="text-sm text-gray-500"></p>
        </div>

        <div id="offers-list" class="space-y-4">
            <div id="loading" class="text-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-red-700 mx-auto mb-4"></div>
                <p class="text-gray-500 font-medium">Finding nearby discounts...</p>
            </div>
        </div>
    </main>

    <script>
        // THE SINGLE BRAIN URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbwDBbCygo0XVBFsvUWffsmciQ03__pM70nHaSY1h_oyIqEaadRMXKgyrLBNmZ39yePQ/exec';

        async function init() {
            if (!navigator.geolocation) {
                showError("Geolocation not supported");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    await fetchOffers(latitude, longitude);
                },
                (err) => {
                    // If GPS fails, try calling the API anyway (for your Admin Override)
                    fetchOffers(0, 0); 
                }
            );
        }

        async function fetchOffers(lat, lon) {
            try {
                const response = await fetch(`${API_URL}?lat=${lat}&lon=${lon}`);
                const data = await response.json();

                if (data.status === "success") {
                    renderUI(data);
                } else if (data.status === "out_of_range") {
                    renderEmpty("Not at a Park & Ride site.");
                } else {
                    renderEmpty("No offers available right now.");
                }
            } catch (e) {
                renderEmpty("Connection error. Try again later.");
            }
        }

        function renderUI(data) {
            const list = document.getElementById('offers-list');
            const badge = document.getElementById('status-badge');
            const locHeader = document.getElementById('location-header');
            
            document.getElementById('loading').classList.add('hidden');
            locHeader.classList.remove('hidden');
            document.getElementById('city-name').innerText = data.city === "Override" ? "Admin: All Offers" : data.city;
            
            badge.innerText = "Live";
            badge.classList.remove('bg-gray-200', 'text-gray-500');
            badge.classList.add('bg-green-100', 'text-green-700');

            if (data.offers.length === 0) {
                renderEmpty("No active offers for this city.");
                return;
            }

            list.innerHTML = data.offers.map(item => `
                <div class="bg-white p-5 rounded-xl shadow-sm card-accent relative overflow-hidden">
                    <span class="text-[9px] uppercase tracking-tighter font-bold text-gray-400 block mb-1">${item.category}</span>
                    <h3 class="text-lg font-black text-gray-900 leading-tight mb-1">${item.business}</h3>
                    <p class="text-red-700 font-bold text-md italic">"${item.offer}"</p>
                    <div class="mt-4 flex justify-end">
                        <button class="bg-black text-white text-[10px] font-bold px-4 py-2 rounded-full uppercase tracking-widest">Show Voucher</button>
                    </div>
                </div>
            `).join('');
        }

        function renderEmpty(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('offers-list').innerHTML = `
                <div class="text-center py-10 bg-white rounded-xl border-2 border-dashed border-gray-200">
                    <p class="text-gray-400 font-medium">${msg}</p>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
