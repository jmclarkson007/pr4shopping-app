<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4S Founding Partner Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full border border-gray-100">
        <h2 class="text-2xl font-bold mb-2 text-gray-800 text-center">Founding Partner Program</h2>
        <p class="text-gray-500 text-center mb-8 text-sm">Register your business and set your exclusive offer.</p>
        
        <form id="registrationForm" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Business Name</label>
                    <input type="text" name="businessName" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">City Location</label>
                <select name="location" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                    <option value="">Select your city...</option>
                    <option value="Bath">Bath</option>
                    <option value="Bristol">Bristol</option>
                    <option value="Cambridge">Cambridge</option>
                    <option value="Canterbury">Canterbury</option>
                    <option value="Chelmsford">Chelmsford</option>
                    <option value="Exeter">Exeter</option>
                    <option value="Leeds">Leeds</option>
                    <option value="Leicester">Leicester</option>
                    <option value="Norwich">Norwich</option>
                    <option value="Oxford">Oxford</option>
                    <option value="Winchester">Winchester</option>
                    <option value="York">York</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Business Category</label>
                <select id="category" name="category" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                    <option value="">Select category...</option>
                    <option value="Coffee">Coffee & Quick Bite</option>
                    <option value="Dining">Dining & Drinks</option>
                    <option value="Shopping">Everyday Shopping</option>
                    <option value="Leisure">Experience & Leisure</option>
                </select>
            </div>

            <div class="bg-orange-50 p-4 rounded-lg border border-orange-100">
                <label class="block text-xs font-bold text-orange-800 uppercase tracking-wider mb-1">Your Offer</label>
                <textarea name="offer" required placeholder="Describe the single offer you'll provide to PR4S users (e.g. 25% off main courses)" class="w-full px-4 py-2 border border-orange-200 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none h-24 text-sm"></textarea>
                <p class="text-[10px] text-orange-700 mt-2 italic">* This is the offer that will be published for your business.</p>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-xl transition-all shadow-lg transform hover:-translate-y-1">
                Register & Secure Founding Price
            </button>
        </form>
    </div>

    <script>
        const stripeLinks = {
            "Coffee": "https://buy.stripe.com/test_9B66oGcmS32p7Mhg6d1oI02",
            "Dining": "https://buy.stripe.com/test_6oUfZgdqW32p2rX2fn1oI03",
            "Shopping": "https://buy.stripe.com/test_4gMfZg72y6eB5E95rz1oI04",
            "Leisure": "https://buy.stripe.com/test_cNi28q3QmfPb1nT9HP1oI05"
        };

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<span class="flex items-center justify-center font-medium">Processing...</span>`;

            const formData = new FormData(this);
            const category = formData.get('category');
            
            // Replace the URL below with your actual Google Script URL from Pending_Registrations
            fetch('PASTE_YOUR_APPS_SCRIPT_URL_HERE', {
                method: 'POST',
                mode: 'no-cors',
                body: new URLSearchParams(formData)
            });

            // Redirect to the category-specific Stripe link after saving data
            setTimeout(() => {
                window.location.href = stripeLinks[category];
            }, 1200);
        });
    </script>
</body>
</html>
