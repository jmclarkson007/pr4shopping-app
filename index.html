<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4Shopping | Partner Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Your Exact Branding */
        .logo { font-size: 32px; font-weight: bold; text-decoration: none; font-family: sans-serif; }
        .logo-pr4 { color: #cc0000; }
        .logo-shopping { color: #000; }
        
        body { background-color: #f9fafb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .btn-red { background-color: #cc0000; transition: background 0.3s; }
        .btn-red:hover { background-color: #a30000; }
    </style>
</head>
<body>

    <header class="bg-white border-b border-gray-200 py-6 text-center shadow-sm">
        <div class="logo"><span class="logo-pr4">PR4</span><span class="logo-shopping">Shopping</span></div>
        <p class="text-[10px] tracking-[0.3em] text-gray-400 uppercase mt-1 font-bold">Founding Partner Program</p>
    </header>

    <main class="max-w-xl mx-auto py-10 px-6">
        <div class="bg-white p-8 rounded-lg border border-gray-200 shadow-sm">
            
            <form id="registrationForm" class="space-y-5">
                
                <div class="space-y-4">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-tight">Business Details</label>
                    <input type="text" name="businessName" placeholder="Business Name" required class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 outline-none">
                    <input type="email" name="email" placeholder="Contact Email" required class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 outline-none">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">City Location</label>
                        <select name="location" required class="w-full px-4 py-3 border border-gray-300 rounded bg-white text-sm">
                            <option value="">Select City...</option>
                            <option value="Bath">Bath</option>
                            <option value="Bristol">Bristol</option>
                            <option value="Cambridge">Cambridge</option>
                            <option value="Canterbury">Canterbury</option>
                            <option value="Chelmsford">Chelmsford</option>
                            <option value="Exeter">Exeter</option>
                            <option value="Leeds">Leeds</option>
                            <option value="Leicester">Leicester</option>
                            <option value="Norwich">Norwich</option>
                            <option value="Oxford">Oxford</option>
                            <option value="Winchester">Winchester</option>
                            <option value="York">York</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Category</label>
                        <select id="category" name="category" required class="w-full px-4 py-3 border border-gray-300 rounded bg-white text-sm">
                            <option value="">Select Category...</option>
                            <option value="Coffee">Coffee & Quick Bite</option>
                            <option value="Dining">Dining & Drinks</option>
                            <option value="Shopping">Everyday Shopping</option>
                            <option value="Leisure">Experience & Leisure</option>
                        </select>
                    </div>
                </div>

                <div class="pt-2">
                    <label class="block text-sm font-bold text-gray-700 uppercase mb-2">Your Offer</label>
                    <textarea name="offer" required placeholder="Describe your single exclusive offer..." class="w-full px-4 py-3 border border-gray-300 rounded h-28 focus:border-red-600 outline-none text-sm"></textarea>
                    <p class="text-[11px] text-gray-400 mt-2 italic">Note: This offer will be displayed to all users in your selected city.</p>
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-red text-white font-bold py-4 rounded text-lg shadow-md uppercase tracking-wider mt-4">
                    Proceed to Secure Payment
                </button>
            </form>
        </div>

        <p class="text-center text-gray-400 text-[10px] mt-8 uppercase tracking-widest">
            &copy; Perimetr Business Services (2026)
        </p>
    </main>

    <script>
        // Your specific Stripe Links
        const stripeLinks = {
            "Coffee": "https://buy.stripe.com/test_9B66oGcmS32p7Mhg6d1oI02",
            "Dining": "https://buy.stripe.com/test_6oUfZgdqW32p2rX2fn1oI03",
            "Shopping": "https://buy.stripe.com/test_4gMfZg72y6eB5E95rz1oI04",
            "Leisure": "https://buy.stripe.com/test_cNi28q3QmfPb1nT9HP1oI05"
        };

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            const formData = new FormData(this);
            const category = formData.get('category');
            
            // Your Apps Script URL from Pending_Registrations
            fetch('https://script.google.com/macros/s/AKfycby757z-QSrUzKLZt_pNGqALUbPWaXZrjRUWUmDTBPjLsREYEMCrZfmduNzOfWHXz8EqNA/exec', {
                method: 'POST',
                mode: 'no-cors',
                body: new URLSearchParams(formData)
            });

            setTimeout(() => {
                window.location.href = stripeLinks[category];
            }, 1200);
        });
    </script>
</body>
</html>
