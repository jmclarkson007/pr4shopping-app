<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4Shopping | Local Discounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-pr4 { color: #cc0000; }
        .offer-card { border-left: 5px solid #cc0000; transition: opacity 0.3s; cursor: pointer; }
        .offer-card.used { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; padding: 24px; border-radius: 12px; max-width: 400px; width: 100%; text-align: center; border-top: 6px solid #cc0000; }
        /* Smooth transition for mobile menu */
        #mobile-menu { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <div id="offer-modal" class="modal-overlay">
        <div class="modal-content shadow-2xl">
            <div id="modal-body"></div>
        </div>
    </div>

    <nav class="bg-white border-b relative z-50">
        <div class="max-w-md mx-auto px-5 py-5 flex justify-between items-center">
            <div class="text-3xl font-black italic tracking-tighter">
                <span class="logo-pr4">PR4</span><span>Shopping</span>
            </div>
            
            <button onclick="toggleMenu()" class="p-2 text-gray-600 focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>

        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-white border-b shadow-xl flex flex-col p-4 gap-3">
            <a href="register.html" class="w-full text-center py-4 font-bold text-white bg-[#cc0000] rounded-xl uppercase text-xs tracking-widest shadow-md">
    Business Register
            </a>
            <a href="portal.html" class="w-full text-center py-4 font-bold text-white bg-black rounded-xl uppercase text-xs tracking-widest shadow-md">
                Business Portal
            </a>
        </div>
    </nav>

    <main class="p-5 max-w-md mx-auto w-full flex-grow">
        <div id="location-status" class="mb-8 text-center pt-4">
            <h2 id="city-name" class="text-2xl font-bold text-gray-800 uppercase tracking-widest text-red-600">Locating...</h2>
            <div id="status-message" class="mt-4 text-gray-500 text-sm italic">Verifying GPS...</div>
            
            <div id="manual-trigger" class="hidden mt-4">
                <button onclick="handleManualOverride()" class="text-[10px] font-bold text-red-600 uppercase border border-red-200 px-4 py-2 rounded-full hover:bg-red-50">
                    At checkout with a P&R Ticket? Tap here.
                </button>
            </div>

            <div id="coords-display" class="mt-4 p-2 text-[10px] bg-gray-100 text-gray-400 rounded font-mono uppercase tracking-tighter"></div>
        </div>

        <div id="offers-list" class="space-y-4"></div>
    </main>

    <footer class="p-8 text-center bg-white border-t mt-auto">
        <div class="mb-4 text-[10px] text-gray-400 font-bold uppercase tracking-widest">&copy; 2026 PERIMETR BUSINESS SERVICES</div>
        <a href="#" class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Terms & Conditions</a>
    </footer>

    <script>
        const SUPABASE_URL = "https://cocjolczajrnikiwolly.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_AEPtmbQAf0U4_1gXLsAoLA_-HOM-3_w";

        // Mobile Menu Toggle Function
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        async function init() {
            const todayKey = new Date().toISOString().split('T')[0];
            const savedOverrideCity = localStorage.getItem(`override_city_${todayKey}`);

            if (savedOverrideCity) {
                document.getElementById('city-name').innerText = `Welcome to ${savedOverrideCity}`;
                document.getElementById('status-message').innerText = "Verified via P&R Ticket.";
                fetchOffers(false, savedOverrideCity);
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const uLat = pos.coords.latitude;
                const uLon = pos.coords.longitude;
                document.getElementById('coords-display').innerText = `Current GPS: ${uLat.toFixed(6)}, ${uLon.toFixed(6)}`;

                try {
                    const res = await fetch(`${SUPABASE_URL}Locations_Database?select=*`, {
                        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                    });
                    const sites = await res.json();
                    let currentSite = null;

                    for (let site of sites) {
                        const dist = getDistance(uLat, uLon, site.Lat, site.Long);
                        if (dist <= 80) { 
                            currentSite = site;
                            break;
                        }
                    }

                    if (currentSite) {
                        if (currentSite.city === "Testcentre H" || currentSite.city === "TestCentreW") {
                            document.getElementById('city-name').innerText = "Admin Override";
                            document.getElementById('status-message').innerText = "Admin Test Mode Active.";
                            fetchOffers(true); 
                        } else {
                            document.getElementById('city-name').innerText = `Welcome to ${currentSite.city}`;
                            document.getElementById('status-message').innerText = "Terminus connection active.";
                            fetchOffers(false, currentSite.city); 
                        }
                    } else {
                        document.getElementById('city-name').innerText = "ACCESS RESTRICTED";
                        document.getElementById('status-message').innerText = "You are not at a Park & Ride terminus.";
                        document.getElementById('manual-trigger').classList.remove('hidden');
                    }
                } catch (err) {
                    document.getElementById('city-name').innerText = "System Error";
                }
            }, null, { enableHighAccuracy: true });
        }

        async function handleManualOverride() {
            const code = prompt("Cashier: Please enter your 9-character Business Override Code:");
            if (!code) return;

            try {
                const res = await fetch(`${SUPABASE_URL}Registrations_Database?select=*`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const merchants = await res.json();
                const merchant = merchants.find(m => m.override_code === code.toUpperCase());

                if (merchant) {
                    const todayKey = new Date().toISOString().split('T')[0];
                    localStorage.setItem(`override_city_${todayKey}`, merchant.city);
                    alert("Ticket Verified. Local offers unlocked.");
                    location.reload();
                } else {
                    alert("Invalid Code. Please present a valid Park & Ride ticket to staff.");
                }
            } catch (e) {
                alert("Error verifying code.");
            }
        }

        async function fetchOffers(isOverride, cityName = "") {
            let url = `${SUPABASE_URL}Registrations_Database?select=*`;
            if (!isOverride) { url += `&city=eq.${cityName}`; }

            const res = await fetch(url, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const offers = await res.json();
            const list = document.getElementById('offers-list');
            const todayKey = new Date().toISOString().split('T')[0];

            if (offers.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-400 uppercase text-xs">No active offers found.</div>`;
                return;
            }

            list.innerHTML = offers.map(item => {
                const isUsed = localStorage.getItem(`used_${item.id}_${todayKey}`);
                const cityCode = item.postcode ? item.postcode.substring(0, 2).toUpperCase() : 'PR';
                
                return `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 offer-card ${isUsed ? 'used' : ''}" 
                         onclick="openRedemptionModal('${cityCode}', '${item.business_name}', '${item.id}')">
                        <div class="flex justify-between items-start mb-1">
                            <p class="text-[9px] font-bold text-gray-400 uppercase">${item.category || item.city}</p>
                            ${isUsed ? '<span class="text-[9px] font-black text-red-600 uppercase">Redeemed Today</span>' : ''}
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 leading-tight">${item.business_name}</h3>
                        <p class="text-red-600 font-extrabold italic text-xl my-2">${item.regular_offer || 'Special Offer'}</p>
                        <p class="text-[10px] text-gray-400 uppercase tracking-tighter mt-2 border-t pt-2">
                            ${item.address_1}, ${item.city}, ${item.postcode}
                        </p>
                    </div>
                `;
            }).join('');
        }

        function openRedemptionModal(cityCode, businessName, offerId) {
            const modal = document.getElementById('offer-modal');
            const body = document.getElementById('modal-body');
            modal.style.display = 'flex';

            body.innerHTML = `
                <h2 class="text-xl font-bold mb-4">Verification</h2>
                <p class="text-gray-600 mb-6 font-medium">Are you in the store at the checkout?</p>
                <div class="flex flex-col gap-3">
                    <button onclick="confirmRedemption('${cityCode}', '${offerId}')" class="bg-red-600 text-white font-bold py-3 rounded-lg uppercase tracking-widest">Yes</button>
                    <button onclick="cancelRedemption()" class="bg-gray-200 text-gray-800 font-bold py-3 rounded-lg uppercase tracking-widest">No</button>
                </div>
            `;
        }

        function confirmRedemption(cityCode, offerId) {
            const d = new Date();
            const dateStr = d.getDate().toString().padStart(2, '0') + (d.getMonth() + 1).toString().padStart(2, '0');
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            const code = `PR4S-${cityCode}-${randomNum}-${dateStr}`;
            
            const todayKey = new Date().toISOString().split('T')[0];
            localStorage.setItem(`used_${offerId}_${todayKey}`, "true");

            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <h2 class="text-sm font-bold text-gray-400 uppercase mb-2 text-center w-full">Validated Code</h2>
                <p class="text-gray-600 text-xs mb-4">Show this to the cashier now:</p>
                <div class="bg-gray-100 border-2 border-dashed border-gray-400 p-4 mb-6">
                    <span class="text-2xl font-black tracking-tighter text-gray-900">${code}</span>
                </div>
                <button onclick="closeModal()" class="w-full bg-black text-white font-bold py-3 rounded-lg uppercase">Done</button>
            `;
        }

        function closeModal() {
            document.getElementById('offer-modal').style.display = 'none';
            location.reload();
        }

        init();
    </script>
</body>
</html>
