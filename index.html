<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4Shopping | Local Discounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-pr4 { color: #cc0000; }
        .offer-card { border-left: 5px solid #cc0000; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="py-8 text-center bg-white border-b">
        <div class="text-3xl font-black italic tracking-tighter">
            <span class="logo-pr4">PR4</span><span>Shopping</span>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto w-full">
        <div id="location-status" class="mb-8 text-center">
            <h2 id="city-name" class="text-2xl font-bold text-gray-800 uppercase tracking-tight tracking-widest">Locating...</h2>
            <div id="loading-spinner" class="mt-4 animate-pulse text-gray-400 text-sm italic">Verifying location access...</div>
        </div>

        <div id="offers-list" class="space-y-4"></div>
    </main>

    <footer class="p-8 text-center bg-white border-t mt-auto">
        <a href="register.html" class="text-[10px] font-bold text-gray-400 hover:text-red-600 uppercase tracking-[0.2em]">Partner Registration</a>
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzwVFsNDRmQo8KUsO00lDnqo0yu0uk4Qb5DNsvjtw8SsQjq8dqr3bdUJoc8WvTfC-Jy/exec';

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const regSuccess = urlParams.get('reg');
            const forcedCity = urlParams.get('city');

            // 1. Check for Partner Golden Ticket (from Stripe)
            if (regSuccess === 'success' && forcedCity) {
                console.log("Partner access granted for: " + forcedCity);
                fetchFromBrain(0, 0, forcedCity);
                return;
            }

            // 2. Otherwise, check GPS for the 80m rule
            navigator.geolocation.getCurrentPosition(
                (pos) => fetchFromBrain(pos.coords.latitude, pos.coords.longitude),
                () => fetchFromBrain(0, 0), // Fallback to Override (for your testing)
                { timeout: 8000, enableHighAccuracy: true }
            );
        }

        async function fetchFromBrain(lat, lon, forcedCity = null) {
            try {
                let query = `?lat=${lat}&lon=${lon}`;
                if (forcedCity) query += `&forceCity=${forcedCity}`;

                const response = await fetch(API_URL + query);
                const data = await response.json();
                
                if (data.status === "success" || data.city === "Override") {
                    displayOffers(data);
                } else {
                    document.getElementById('city-name').innerText = "Access Restricted";
                    document.getElementById('loading-spinner').innerHTML = "Access is only available within 80m of a Park & Ride site.";
                }
            } catch (err) {
                document.getElementById('city-name').innerText = "Connection Error";
                document.getElementById('loading-spinner').innerText = "Check your internet connection.";
            }
        }

        function displayOffers(data) {
            const header = document.getElementById('city-name');
            const list = document.getElementById('offers-list');
            document.getElementById('loading-spinner').classList.add('hidden');

            header.innerText = data.city === "Override" ? "ALL LOCATIONS" : data.city;

            if (!data.offers || data.offers.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-400">No active offers for ${data.city} yet.</div>`;
                return;
            }

            list.innerHTML = data.offers.map(item => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 offer-card">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">${item.category}</p>
                    <h3 class="text-lg font-bold text-gray-900 mb-1 leading-tight">${item.business}</h3>
                    <p class="text-red-600 font-extrabold text-xl italic">${item.offer}</p>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
