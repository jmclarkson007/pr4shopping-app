<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4Shopping | Local Discounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-pr4 { color: #cc0000; }
        .offer-card { border-left: 5px solid #cc0000; transition: opacity 0.3s; }
        .offer-card.used { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="py-6 text-center bg-white border-b relative">
        <a href="register.html" class="absolute top-2 right-2 text-[10px] font-bold text-gray-400 hover:text-red-600 uppercase tracking-widest border border-gray-200 px-2 py-1 rounded">Business Registration</a>
        <div class="text-3xl font-black italic tracking-tighter">
            <span class="logo-pr4">PR4</span><span>Shopping.com</span>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto w-full flex-grow">
        <div id="location-status" class="mb-8 text-center">
            <h2 id="city-name" class="text-2xl font-bold text-gray-800 uppercase tracking-widest text-red-600">Locating...</h2>
            <div id="status-message" class="mt-4 text-gray-500 text-sm italic">Verifying GPS...</div>
            <div id="coords-display" class="mt-4 p-2 text-[10px] bg-gray-100 text-gray-400 rounded font-mono uppercase tracking-tighter"></div>
        </div>

        <div id="offers-list" class="space-y-4"></div>
    </main>

    <footer class="p-8 text-center bg-white border-t">
        <a href="#" class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Terms & Conditions</a>
    </footer>

    <script>
        const SUPABASE_URL = "https://cocjolczajrnikiwolly.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_AEPtmbQAf0U4_1gXLsAoLA_-HOM-3_w";

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        async function init() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const uLat = pos.coords.latitude;
                const uLon = pos.coords.longitude;

                document.getElementById('coords-display').innerText = `Current GPS: ${uLat.toFixed(6)}, ${uLon.toFixed(6)}`;

                try {
                    const res = await fetch(`${SUPABASE_URL}Locations_Database?select=*`, {
                        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                    });
                    const sites = await res.json();

                    let currentSite = null;

                    for (let site of sites) {
                        const dist = getDistance(uLat, uLon, site.Lat, site.Long);
                        if (dist <= 80) { 
                            currentSite = site;
                            break;
                        }
                    }

                    if (currentSite) {
                        // Check for your specific Test Centre overrides
                        if (currentSite.city === "Testcentre H" || currentSite.city === "TestCentreW") {
                            document.getElementById('city-name').innerText = "User Location Override";
                            document.getElementById('status-message').innerText = `Admin Test Mode: Viewing all city offers via ${currentSite.city}`;
                            fetchOffers(true); 
                        } else {
                            document.getElementById('city-name').innerText = `Welcome to ${currentSite.city}`;
                            document.getElementById('status-message').innerText = "Terminus connection active.";
                            fetchOffers(false, currentSite.city); 
                        }
                    } else {
                        document.getElementById('city-name').innerText = "ACCESS RESTRICTED";
                        document.getElementById('status-message').innerText = "You are not at a Park & Ride terminus.";
                    }
                } catch (err) {
                    document.getElementById('city-name').innerText = "System Error";
                }
            }, null, { enableHighAccuracy: true });
        }

        async function fetchOffers(isOverride, city = "") {
            let url = `${SUPABASE_URL}Registrations_Database?select=*`;
            if (!isOverride) { url += `&city=eq.${city}`; }

            const res = await fetch(url, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const offers = await res.json();
            const list = document.getElementById('offers-list');

            if (offers.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-400 uppercase text-xs">No active offers found.</div>`;
                return;
            }

            list.innerHTML = offers.map(item => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 offer-card" onclick="this.classList.add('used'); alert('Claimed: ' + Math.random().toString(36).substring(2, 8).toUpperCase())">
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">${item.city}</p>
                    <h3 class="text-lg font-bold text-gray-900 leading-tight">${item.business_name}</h3>
                    <p class="text-red-600 font-extrabold italic text-xl">${item.offer_details}</p>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
