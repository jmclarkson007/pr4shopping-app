<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4S Business Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border border-gray-100">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Founding Partner Registration</h2>
        
        <form id="registrationForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Business Name</label>
                <input type="text" name="businessName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Business Category</label>
                <select id="category" name="category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                    <option value="">Select a category...</option>
                    <option value="Coffee">Coffee & Quick Bite</option>
                    <option value="Dining">Dining & Drinks</option>
                    <option value="Shopping">Everyday Shopping</option>
                    <option value="Leisure">Experience & Leisure</option>
                </select>
            </div>

            <div id="offerBox" class="bg-blue-50 p-4 rounded-lg border border-blue-100 hidden">
                <p class="text-blue-800 text-sm italic text-center font-medium">
                    "Founding Partner Offer: £1.00 Setup Fee"
                </p>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-md mt-4">
                Continue to Secure Setup
            </button>
        </form>
    </div>

    <script>
        const stripeLinks = {
            "Coffee": "https://buy.stripe.com/test_9B66oGcmS32p7Mhg6d1oI02",
            "Dining": "https://buy.stripe.com/test_6oUfZgdqW32p2rX2fn1oI03",
            "Shopping": "https://buy.stripe.com/test_4gMfZg72y6eB5E95rz1oI04",
            "Leisure": "https://buy.stripe.com/test_cNi28q3QmfPb1nT9HP1oI05"
        };

        const categorySelect = document.getElementById('category');
        const offerBox = document.getElementById('offerBox');

        categorySelect.addEventListener('change', function() {
            if (this.value) {
                offerBox.classList.remove('hidden');
            } else {
                offerBox.classList.add('hidden');
            }
        });

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Connecting to Stripe...";

            const formData = new FormData(this);
            const category = formData.get('category');
            
            // 1. Send Data to Google Sheets
            fetch('YOUR_GOOGLE_SCRIPT_URL_HERE', {
                method: 'POST',
                mode: 'no-cors',
                body: new URLSearchParams(formData)
            });

            // 2. Redirect to the correct Stripe Link
            setTimeout(() => {
                window.location.href = stripeLinks[category];
            }, 1000);
        });
    </script>
</body>
</html>
