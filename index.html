<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4Shopping | Local Discounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-pr4 { color: #cc0000; }
        .logo-shopping { color: #000; }
        .offer-card { border-left: 5px solid #cc0000; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="py-8 text-center bg-white border-b">
        <div class="text-3xl font-black italic tracking-tighter">
            <span class="logo-pr4">PR4</span><span class="logo-shopping">Shopping</span>
        </div>
    </header>

    <main class="flex-grow p-5 max-w-md mx-auto w-full">
        <div id="location-status" class="mb-8 text-center">
            <h2 id="city-name" class="text-2xl font-bold text-gray-800 uppercase tracking-tight">Locating...</h2>
            <div id="loading-spinner" class="mt-4 animate-pulse text-gray-400 text-sm">Checking for local offers...</div>
        </div>

        <div id="offers-list" class="space-y-4">
            </div>
    </main>

    <footer class="p-8 text-center bg-white border-t">
        <a href="register.html" class="text-sm font-bold text-gray-500 hover:text-red-600 transition-colors uppercase tracking-widest">
            Partner Registration
        </a>
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwDBbCygo0XVBFsvUWffsmciQ03__pM70nHaSY1h_oyIqEaadRMXKgyrLBNmZ39yePQ/exec';

        async function getVouchers() {
            if (!navigator.geolocation) {
                renderError("Geolocation not supported");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    await fetchFromBrain(pos.coords.latitude, pos.coords.longitude);
                },
                async () => {
                    // Fallback for desktop/blocked GPS to trigger Override check
                    await fetchFromBrain(0, 0);
                }
            );
        }

        async function fetchFromBrain(lat, lon) {
            try {
                const response = await fetch(`${API_URL}?lat=${lat}&lon=${lon}`);
                const data = await response.json();
                
                if (data.status === "success") {
                    displayOffers(data);
                } else {
                    document.getElementById('city-name').innerText = "Out of Range";
                    document.getElementById('loading-spinner').innerText = "Please visit a Park & Ride site to see offers.";
                }
            } catch (err) {
                document.getElementById('city-name').innerText = "System Offline";
                document.getElementById('loading-spinner').innerText = "Unable to connect to the offer engine.";
            }
        }

        function displayOffers(data) {
            const header = document.getElementById('city-name');
            const spinner = document.getElementById('loading-spinner');
            const list = document.getElementById('offers-list');

            // Handle Override vs City Name
            header.innerText = data.city === "Override" ? "ALL LOCATIONS" : data.city;
            spinner.classList.add('hidden');

            if (!data.offers || data.offers.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-400 mt-10">No offers currently active for this area.</p>`;
                return;
            }

            list.innerHTML = data.offers.map(item => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 offer-card">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">${item.category}</p>
                    <h3 class="text-lg font-bold text-gray-900 leading-tight mb-2">${item.business}</h3>
                    <p class="text-red-600 font-extrabold text-xl italic leading-tight">${item.offer}</p>
                </div>
            `).join('');
        }

        getVouchers();
    </script>
</body>
</html>
