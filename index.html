<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR4Shopping | Local Offers Near You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo { font-size: 28px; font-weight: bold; text-decoration: none; font-family: sans-serif; }
        .logo-pr4 { color: #cc0000; }
        .logo-shopping { color: #000; }
        .offer-card { border-left: 5px solid #cc0000; transition: transform 0.2s; }
        .offer-card:active { transform: scale(0.98); }
        .loader { border-top-color: #cc0000; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 py-5 px-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="logo"><span class="logo-pr4">PR4</span><span class="logo-shopping">Shopping</span></div>
        <div id="gps-indicator" class="flex items-center text-[10px] font-bold uppercase tracking-widest text-gray-400">
            <span class="w-2 h-2 bg-gray-300 rounded-full mr-2"></span> Locating...
        </div>
    </header>

    <main class="flex-grow max-w-lg mx-auto w-full p-4">
        
        <div id="status-area" class="mb-8 mt-4">
            <h2 id="status-heading" class="text-3xl font-black text-gray-900 tracking-tight">Checking Location...</h2>
            <p id="status-subtext" class="text-gray-500 text-sm">Please allow GPS access to verify your Park & Ride status.</p>
        </div>

        <div id="offer-list" class="space-y-4">
            <div id="loading-spinner" class="flex flex-col items-center py-20">
                <div class="loader w-12 h-12 border-4 border-gray-200 rounded-full mb-4"></div>
                <p class="text-gray-400 text-sm animate-pulse">Syncing with Park & Ride locations...</p>
            </div>
        </div>

    </main>

    <footer class="p-8 bg-white border-t border-gray-100 text-center">
        <p class="text-gray-400 text-xs uppercase tracking-[0.2em] mb-3 font-bold">Business Partners</p>
        <a href="register.html" class="inline-block bg-black text-white text-xs font-bold py-3 px-6 rounded uppercase tracking-widest hover:bg-gray-800 transition-all">
            Join the Founding Partner Program
        </a>
    </footer>

    <script>
        // CONFIGURATION: Replace these with your actual Google Script Web App URLs
        const LOCATIONS_API = 'YOUR_PARK_AND_RIDE_SCRIPT_URL'; 
        const OFFERS_API = 'YOUR_PENDING_REGISTRATIONS_SCRIPT_URL';

        async function initApp() {
            if (!navigator.geolocation) {
                updateUI("Unsupported", "Your browser doesn't support GPS.");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                
                // Update Header
                document.getElementById('gps-indicator').innerHTML = '<span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-ping"></span> Live GPS';
                
                try {
                    // 1. Verify Location against Parkandridelocations spreadsheet
                    // Logic: Send GPS to script, it returns the City name if near a P&R
                    const response = await fetch(`${LOCATIONS_API}?lat=${latitude}&lng=${longitude}`);
                    const data = await response.json();

                    if (data.verified) {
                        updateUI(`Offers in ${data.city}`, "Your Park & Ride location is verified.");
                        loadOffers(data.city);
                    } else {
                        updateUI("Not at Park & Ride", "Please arrive at a verified location to unlock offers.");
                        document.getElementById('offer-list').innerHTML = '<p class="text-center text-gray-400 py-10 italic border-2 border-dashed rounded-xl">Offers are exclusive to Park & Ride users.</p>';
                    }
                } catch (err) {
                    // Fallback for testing: If you aren't at a P&R yet, let's show how it looks
                    updateUI("Demo Mode", "Could not verify P&R. (Connecting to database...)");
                }
            }, (error) => {
                updateUI("GPS Required", "Please enable location services to see local deals.");
            });
        }

        async function loadOffers(city) {
            try {
                const response = await fetch(`${OFFERS_API}?city=${city}`);
                const offers = await response.json();
                
                const container = document.getElementById('offer-list');
                container.innerHTML = ''; // Clear loading spinner

                if (offers.length === 0) {
                    container.innerHTML = '<p class="text-center py-20 text-gray-400 italic font-medium">No active offers in this city yet.</p>';
                    return;
                }

                offers.forEach(item => {
                    const card = `
                        <div class="offer-card bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
                            <div>
                                <h4 class="text-[10px] uppercase tracking-widest font-bold text-gray-400">${item.category}</h4>
                                <h3 class="text-lg font-extrabold text-gray-900">${item.businessName}</h3>
                                <p class="text-red-600 font-bold text-sm mt-1">${item.offer}</p>
                            </div>
                            <div class="text-right">
                                <button class="bg-gray-100 text-black text-[10px] font-black px-3 py-2 rounded uppercase tracking-tighter">Claim</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (err) {
                console.log("Error loading offers");
            }
        }

        function updateUI(heading, subtext) {
            document.getElementById('status-heading').innerText = heading;
            document.getElementById('status-subtext').innerText = subtext;
            document.getElementById('loading-spinner').classList.add('hidden');
        }

        window.onload = initApp;
    </script>
</body>
</html>
